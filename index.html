<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asatbek Sattarov</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #111827, #1e293b, #0f172a);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    .avatar {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      margin: 0 auto 22px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.35);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      display: block;
      text-decoration: none;
      color: white;
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      transition: 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3);
    }

    .resume {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
    }

    .linkedin {
      background: linear-gradient(135deg, #0a66c2, #0284c7);
    }

    .github {
      background: linear-gradient(135deg, #18181b, #3f3f46);
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 22px;
      }

      h1 {
        font-size: 27px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">AS</div>

    <h1>Asatbek Sattarov</h1>
    <p class="subtitle">
      Film & Media Student<br />
      Personal links and professional profiles
    </p>

    <div class="buttons">
      <a class="btn resume" href="https://docs.google.com/document/d/1BNV1FC18G-X0KQRPk3COBEbx4wdgMbl0EiuXunkO--0/edit?usp=sharing" target="_blank">
        View My Resume
      </a>

      <a class="btn linkedin" href="https://www.linkedin.com/in/асатбек-саттаров-43ba6a406/" target="_blank">
        LinkedIn Profile
      </a>

      <a class="btn github" href="https://github.com/Asat16092003" target="_blank">
        GitHub Profile
      </a>
    </div>

    <p class="footer">© 2026 Asatbek Sattarov</p>
  </main>
</body>
</html>
